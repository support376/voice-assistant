<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음성 비서</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Malgun Gothic', sans-serif;
            background: #0a0a0a; color: #e0e0e0;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; }

        .tabs {
            display: flex; gap: 8px; margin-bottom: 24px;
        }
        .tab {
            padding: 10px 24px; border: 1px solid #333; border-radius: 8px;
            background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.9rem;
        }
        .tab.active { background: #2a5cff; color: #fff; border-color: #2a5cff; }

        .panel { display: none; width: 100%; max-width: 500px; }
        .panel.active { display: flex; flex-direction: column; align-items: center; }

        /* 실시간 대화 */
        .mic-btn {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #333; background: #1a1a1a;
            color: #fff; font-size: 2.5rem; cursor: pointer;
            transition: all 0.2s; margin: 30px 0;
        }
        .mic-btn:hover { border-color: #2a5cff; }
        .mic-btn.recording { background: #ff3b3b; border-color: #ff3b3b; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status { font-size: 0.9rem; color: #888; margin-bottom: 20px; }

        /* 타이머 */
        .timer-row { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
        .timer-row input[type=range] { width: 200px; }
        .timer-value { font-size: 1.5rem; font-weight: bold; min-width: 50px; text-align: center; }

        .notify-select {
            display: flex; gap: 10px; margin: 16px 0;
        }
        .notify-opt {
            padding: 8px 16px; border: 1px solid #333; border-radius: 6px;
            background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.85rem;
        }
        .notify-opt.active { background: #2a5cff; color: #fff; border-color: #2a5cff; }

        /* 음성 등록 */
        .register-form { width: 100%; max-width: 400px; }
        .register-form input {
            width: 100%; padding: 12px; border: 1px solid #333;
            border-radius: 8px; background: #1a1a1a; color: #fff;
            font-size: 1rem; margin-bottom: 12px;
        }
        .btn {
            padding: 12px 28px; border: none; border-radius: 8px;
            background: #2a5cff; color: #fff; font-size: 1rem;
            cursor: pointer;
        }
        .btn:hover { background: #1e4bd4; }
        .btn:disabled { background: #333; cursor: not-allowed; }

        /* 대화 로그 */
        .log {
            width: 100%; max-width: 500px; margin-top: 20px;
            max-height: 400px; overflow-y: auto;
            border: 1px solid #222; border-radius: 8px;
            padding: 16px; background: #111;
        }
        .log-entry {
            margin-bottom: 8px; padding: 8px;
            border-radius: 6px; font-size: 0.9rem;
        }
        .log-entry .speaker {
            font-weight: bold; margin-right: 8px;
            color: #2a5cff;
        }
        .log-entry .speaker.me { color: #4caf50; }
        .log-entry .speaker.unknown { color: #ff9800; }

        /* 히스토리 */
        .history-list { width: 100%; max-width: 500px; }
        .history-item {
            padding: 12px; margin-bottom: 8px;
            border: 1px solid #222; border-radius: 8px;
            background: #111; cursor: pointer;
        }
        .history-item:hover { border-color: #2a5cff; }

        /* 오디오 레벨 + 타이머 */
        .audio-monitor {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 16px; width: 100%; max-width: 400px;
        }
        .level-bar-bg {
            flex: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden;
        }
        .level-bar {
            height: 100%; width: 0%; border-radius: 6px;
            background: linear-gradient(90deg, #4caf50, #ff9800, #ff3b3b);
            transition: width 0.1s;
        }
        .elapsed {
            font-size: 1.3rem; font-weight: bold; font-variant-numeric: tabular-nums;
            min-width: 60px; text-align: right; color: #fff;
        }
        .audio-label {
            font-size: 0.75rem; color: #666; min-width: 24px; text-align: right;
        }
        .server-bar {
            width: 100%; max-width: 500px; display: flex; gap: 8px;
            margin-bottom: 20px; align-items: center;
        }
        .server-bar input {
            flex: 1; padding: 8px 12px; border: 1px solid #333; border-radius: 6px;
            background: #1a1a1a; color: #fff; font-size: 0.85rem;
        }
        .server-bar .dot {
            width: 10px; height: 10px; border-radius: 50%; background: #ff3b3b;
        }
        .server-bar .dot.connected { background: #4caf50; }
        .server-bar button {
            padding: 8px 14px; border: 1px solid #333; border-radius: 6px;
            background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>음성 비서</h1>

    <div class="server-bar">
        <div class="dot" id="server-dot"></div>
        <input type="text" id="server-url" value="localhost:8000" placeholder="백엔드 주소 (예: localhost:8000)">
        <button onclick="checkServer()">연결</button>
    </div>

    <div class="tabs">
        <div class="tab active" data-panel="live">실시간 대화</div>
        <div class="tab" data-panel="record">타이머 녹음</div>
        <div class="tab" data-panel="register">음성 등록</div>
        <div class="tab" data-panel="history">기록</div>
    </div>

    <!-- 실시간 대화 -->
    <div class="panel active" id="panel-live">
        <div class="status" id="live-status">마이크 버튼을 눌러 대화를 시작하세요</div>
        <div class="audio-monitor" id="live-monitor" style="display:none">
            <span class="elapsed" id="live-elapsed">0:00</span>
            <div class="level-bar-bg"><div class="level-bar" id="live-level"></div></div>
            <span class="audio-label" id="live-db">--</span>
        </div>
        <button class="mic-btn" id="live-mic">🎙</button>
        <div class="log" id="live-log"></div>
    </div>

    <!-- 타이머 녹음 -->
    <div class="panel" id="panel-record">
        <div class="status" id="record-status">녹음 시간을 선택하세요</div>
        <div class="timer-row">
            <input type="range" id="timer-slider" min="1" max="10" value="5">
            <div class="timer-value"><span id="timer-val">5</span>분</div>
        </div>
        <div class="notify-select">
            <div class="notify-opt active" data-mode="screen">화면</div>
            <div class="notify-opt" data-mode="voice">음성</div>
            <div class="notify-opt" data-mode="both">둘 다</div>
        </div>
        <div class="audio-monitor" id="record-monitor" style="display:none">
            <span class="elapsed" id="record-elapsed">0:00</span>
            <div class="level-bar-bg"><div class="level-bar" id="record-level"></div></div>
            <span class="audio-label" id="record-db">--</span>
        </div>
        <button class="mic-btn" id="record-mic">⏺</button>
        <div class="log" id="record-log"></div>
    </div>

    <!-- 음성 등록 -->
    <div class="panel" id="panel-register">
        <div class="register-form">
            <div class="status" id="reg-status">이름을 입력하고 5초간 음성을 녹음하세요</div>
            <input type="text" id="reg-name" placeholder="이름 (예: 나)" value="나">
            <label style="color:#aaa; margin-bottom:12px; display:block;">
                <input type="checkbox" id="reg-owner" checked> 내 목소리
            </label>
            <button class="btn" id="reg-btn">녹음 시작 (5초)</button>
        </div>
    </div>

    <!-- 기록 -->
    <div class="panel" id="panel-history">
        <div class="history-list" id="history-list">로딩 중...</div>
    </div>

    <script>
    // --- Server connection ---
    function getServerUrl() { return document.getElementById('server-url').value.trim(); }
    function getWsUrl() { return `ws://${getServerUrl()}`; }
    function getHttpUrl() { return `http://${getServerUrl()}`; }

    async function checkServer() {
        const dot = document.getElementById('server-dot');
        try {
            const res = await fetch(`${getHttpUrl()}/api/conversations`, { signal: AbortSignal.timeout(3000) });
            if (res.ok) { dot.classList.add('connected'); }
            else { dot.classList.remove('connected'); }
        } catch(e) { dot.classList.remove('connected'); }
    }
    checkServer();

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
            if (tab.dataset.panel === 'history') loadHistory();
        });
    });

    // --- Notify mode ---
    let notifyMode = 'screen';
    document.querySelectorAll('.notify-opt').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.notify-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            notifyMode = opt.dataset.mode;
        });
    });

    // --- Timer slider ---
    const slider = document.getElementById('timer-slider');
    const timerVal = document.getElementById('timer-val');
    slider.addEventListener('input', () => timerVal.textContent = slider.value);

    // --- Audio context ---
    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 16000 });
        return audioCtx;
    }

    // --- Live conversation ---
    let liveWs = null;
    let liveStream = null;
    let liveProcessor = null;
    let isLive = false;

    const liveMic = document.getElementById('live-mic');
    const liveStatus = document.getElementById('live-status');
    const liveLog = document.getElementById('live-log');

    liveMic.addEventListener('click', async () => {
        if (!isLive) {
            await startLive();
        } else {
            stopLive();
        }
    });

    async function startLive() {
        isLive = true;
        liveMic.classList.add('recording');
        liveMic.textContent = '⏹';
        liveStatus.textContent = '연결 중...';
        liveLog.innerHTML = '';

        startElapsed(
            document.getElementById('live-elapsed'),
            document.getElementById('live-level'),
            document.getElementById('live-db'),
            document.getElementById('live-monitor')
        );

        liveWs = new WebSocket(`${getWsUrl()}/ws/live`);

        liveWs.onmessage = (evt) => {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'connected') {
                liveStatus.textContent = '대화 중... (버튼을 눌러 종료)';
                startMicStream();
            } else if (msg.type === 'audio') {
                playAudioChunk(msg.data);
            } else if (msg.type === 'text') {
                addLog(liveLog, msg.speaker, msg.text);
            } else if (msg.type === 'session_end') {
                liveStatus.textContent = `대화 종료 (${msg.duration}초, #${msg.conversation_id})`;
            } else if (msg.type === 'error') {
                liveStatus.textContent = '오류: ' + msg.message;
            }
        };

        liveWs.onclose = () => {
            isLive = false;
            liveMic.classList.remove('recording');
            liveMic.textContent = '🎙';
        };
    }

    function stopLive() {
        if (liveWs && liveWs.readyState === WebSocket.OPEN) {
            liveWs.send(JSON.stringify({ type: 'stop' }));
        }
        stopMicStream();
        stopElapsed(document.getElementById('live-monitor'));
        isLive = false;
        liveMic.classList.remove('recording');
        liveMic.textContent = '🎙';
    }

    // --- Timer recording ---
    let recordWs = null;
    let isRecording = false;
    let recordTimer = null;

    const recordMic = document.getElementById('record-mic');
    const recordStatus = document.getElementById('record-status');
    const recordLog = document.getElementById('record-log');

    recordMic.addEventListener('click', async () => {
        if (!isRecording) {
            await startRecord();
        } else {
            stopRecord();
        }
    });

    async function startRecord() {
        isRecording = true;
        recordMic.classList.add('recording');
        recordMic.textContent = '⏹';
        recordLog.innerHTML = '';

        const minutes = parseInt(slider.value);
        let remaining = minutes * 60;

        recordStatus.textContent = `녹음 중... ${minutes}:00`;

        startElapsed(
            document.getElementById('record-elapsed'),
            document.getElementById('record-level'),
            document.getElementById('record-db'),
            document.getElementById('record-monitor')
        );

        recordWs = new WebSocket(`${getWsUrl()}/ws/record`);

        recordWs.onopen = () => startMicStream(recordWs);

        recordWs.onmessage = (evt) => {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'result') {
                recordStatus.textContent = `처리 완료 (${msg.duration}초)`;
                msg.utterances.forEach(u => addLog(recordLog, u.speaker, u.text));
            }
        };

        recordTimer = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                stopRecord();
                return;
            }
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            recordStatus.textContent = `녹음 중... ${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function stopRecord() {
        clearInterval(recordTimer);
        if (recordWs && recordWs.readyState === WebSocket.OPEN) {
            recordWs.send(JSON.stringify({ type: 'stop' }));
        }
        stopMicStream();
        stopElapsed(document.getElementById('record-monitor'));
        isRecording = false;
        recordMic.classList.remove('recording');
        recordMic.textContent = '⏺';
        recordStatus.textContent = '처리 중...';
    }

    // --- Audio monitor ---
    let elapsedInterval = null;
    let elapsedSec = 0;
    let currentLevelBar = null;
    let currentDbLabel = null;
    let currentElapsedEl = null;

    function startElapsed(elapsedEl, levelBar, dbLabel, monitorEl) {
        elapsedSec = 0;
        currentElapsedEl = elapsedEl;
        currentLevelBar = levelBar;
        currentDbLabel = dbLabel;
        monitorEl.style.display = 'flex';
        elapsedEl.textContent = '0:00';
        elapsedInterval = setInterval(() => {
            elapsedSec++;
            const m = Math.floor(elapsedSec / 60);
            const s = elapsedSec % 60;
            elapsedEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function stopElapsed(monitorEl) {
        clearInterval(elapsedInterval);
        if (currentLevelBar) currentLevelBar.style.width = '0%';
        if (currentDbLabel) currentDbLabel.textContent = '--';
    }

    function updateLevel(input) {
        if (!currentLevelBar) return;
        let sum = 0;
        for (let i = 0; i < input.length; i++) sum += input[i] * input[i];
        const rms = Math.sqrt(sum / input.length);
        const db = rms > 0 ? 20 * Math.log10(rms) : -100;
        const pct = Math.max(0, Math.min(100, (db + 60) / 60 * 100));
        currentLevelBar.style.width = pct + '%';
        currentDbLabel.textContent = Math.round(db) + '';
    }

    // --- Mic streaming ---
    let micStream = null;
    let micNode = null;

    async function startMicStream(ws) {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();

        micStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
        const source = ctx.createMediaStreamSource(micStream);
        micNode = ctx.createScriptProcessor(8192, 1, 1);

        micNode.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            updateLevel(input);
            const pcm16 = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                pcm16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
            }
            const b64 = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
            const target = ws || liveWs;
            if (target && target.readyState === WebSocket.OPEN) {
                target.send(JSON.stringify({ type: 'audio', data: b64 }));
            }
        };

        source.connect(micNode);
        micNode.connect(ctx.destination);
    }

    function stopMicStream() {
        if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        if (micNode) { micNode.disconnect(); micNode = null; }
    }

    // --- Audio playback ---
    function playAudioChunk(b64data) {
        const ctx = getAudioCtx();
        const raw = atob(b64data);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        const pcm16 = new Int16Array(bytes.buffer);
        const float32 = new Float32Array(pcm16.length);
        for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;
        const buf = ctx.createBuffer(1, float32.length, 24000);
        buf.getChannelData(0).set(float32);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start();
    }

    // --- Log ---
    function addLog(container, speaker, text) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        const cls = speaker === '나' ? 'me' : (speaker === 'unknown' ? 'unknown' : '');
        div.innerHTML = `<span class="speaker ${cls}">[${speaker}]</span>${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // --- History ---
    async function loadHistory() {
        const list = document.getElementById('history-list');
        try {
            const res = await fetch(`${getHttpUrl()}/api/conversations`);
            const convs = await res.json();
            if (convs.length === 0) {
                list.innerHTML = '<div style="color:#666">기록이 없습니다</div>';
                return;
            }
            list.innerHTML = convs.map(c => `
                <div class="history-item" onclick="loadConv(${c.id})">
                    <div><strong>#${c.id}</strong> ${c.mode} | ${c.duration_sec ? c.duration_sec.toFixed(0) + '초' : '진행중'}</div>
                    <div style="color:#666; font-size:0.8rem">${c.started_at}</div>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = '<div style="color:#f66">로드 실패</div>';
        }
    }

    async function loadConv(id) {
        try {
            const res = await fetch(`${getHttpUrl()}/api/conversations/${id}`);
            const utts = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = `<button class="btn" onclick="loadHistory()" style="margin-bottom:12px">← 돌아가기</button>`;
            utts.forEach(u => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                const cls = u.speaker === '나' ? 'me' : (u.speaker === 'unknown' ? 'unknown' : '');
                div.innerHTML = `<span class="speaker ${cls}">[${u.speaker}]</span>${u.text}`;
                list.appendChild(div);
            });
        } catch(e) {}
    }

    // --- Voice registration ---
    const regBtn = document.getElementById('reg-btn');
    const regStatus = document.getElementById('reg-status');

    regBtn.addEventListener('click', async () => {
        const name = document.getElementById('reg-name').value.trim();
        const isOwner = document.getElementById('reg-owner').checked;
        if (!name) { regStatus.textContent = '이름을 입력하세요'; return; }

        regBtn.disabled = true;
        regStatus.textContent = '녹음 중... (5초)';

        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
        const source = ctx.createMediaStreamSource(stream);
        const processor = ctx.createScriptProcessor(8192, 1, 1);
        const chunks = [];

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const pcm16 = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                pcm16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
            }
            chunks.push(new Uint8Array(pcm16.buffer));
        };

        source.connect(processor);
        processor.connect(ctx.destination);

        await new Promise(r => setTimeout(r, 5000));

        processor.disconnect();
        source.disconnect();
        stream.getTracks().forEach(t => t.stop());

        regStatus.textContent = '등록 중...';

        const total = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
        let offset = 0;
        for (const c of chunks) { total.set(c, offset); offset += c.length; }
        const b64 = btoa(String.fromCharCode(...total));

        const ws = new WebSocket(`${getWsUrl()}/ws/register`);
        ws.onopen = () => ws.send(JSON.stringify({ name, is_owner: isOwner, audio: b64 }));
        ws.onmessage = (evt) => {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'registered') {
                regStatus.textContent = `'${msg.name}' 등록 완료!`;
            } else if (msg.type === 'error') {
                regStatus.textContent = '오류: ' + msg.message;
            }
            regBtn.disabled = false;
        };
    });
    </script>
</body>
</html>
